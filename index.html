<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailTrack - Privacy Policy</title>
    <link rel="icon" type="image/png" href="../website/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #006874;
            --on-primary: #FFFFFF;
            --surface: #F8FDFF;
            --on-surface: #191C1D;
            --surface-container: #ECEFF0;
            --surface-container-low: #F0F4F5;
            --secondary: #4A6266;
            --outline: #6F797A;
            --radius-xxl: 32px;
            --radius-xl: 24px;
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @font-face {
            font-family: 'GoogleSansFlex';
            src: url('../website/assets/fonts/GoogleSansFlex.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Funnel Display';
            src: url('../website/assets/fonts/FunnelDisplay-VariableFont_wght.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'GoogleSansFlex', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navbar */
        nav {
            padding: 24px 0;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            background: rgba(248, 253, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--surface-container);
            z-index: 100;
        }

        .lang-switch {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            background: var(--surface-container);
            padding: 4px;
            border-radius: 100px;
        }

        .lang-btn {
            border: none;
            background: transparent;
            padding: 6px 16px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--secondary);
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: var(--primary);
            color: var(--on-primary);
        }

        /* Content */
        .logo {
            font-family: 'GoogleSansFlex', sans-serif;
            font-weight: 900;
            font-size: 3rem;
            color: var(--primary);
            letter-spacing: -1px;
            text-align: center;
            margin: 60px 0 40px;
        }

        .nav-logo {
            font-family: 'Funnel Display', sans-serif;
            font-weight: 900;
            color: var(--primary);
            font-size: 1.5rem;
            letter-spacing: -1px;
            text-decoration: none;
        }

        .policy-card {
            background: white;
            padding: 60px;
            border-radius: var(--radius-xxl);
            box-shadow: 0 12px 48px rgba(0,0,0,0.03);
            margin-bottom: 80px;
            border: 1px solid var(--surface-container);
        }

        #content h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--on-surface);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        #content p.last-updated {
            color: var(--secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        #content h2 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-top: 48px;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        #content h3 {
            font-size: 1.3rem;
            margin-top: 32px;
            margin-bottom: 12px;
            color: var(--on-surface);
        }

        #content p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--on-surface);
            opacity: 0.9;
        }

        #content ul {
            padding-left: 24px;
            margin-bottom: 24px;
        }

        #content li {
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        #content a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px solid var(--surface-container);
            transition: border-color 0.3s ease;
        }

        #content a:hover {
            border-color: var(--primary);
        }

        footer {
            padding: 80px 0;
            text-align: center;
            border-top: 1px solid var(--surface-container);
        }

        footer p { color: var(--outline); font-size: 0.95rem; }

        @media (max-width: 768px) {
            .logo { font-size: 2.5rem; }
            .policy-card { padding: 32px 24px; border-radius: var(--radius-xl); }
            #content h1 { font-size: 2rem; }
            #content h2 { font-size: 1.5rem; }
            .lang-switch { position: static; transform: none; margin-left: auto; }
            nav { justify-content: space-between; padding: 16px 24px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="https://railtrack.pages.dev/" class="nav-logo">RailTrack</a>
        <div class="lang-switch">
            <button class="lang-btn" id="btn-it" onclick="setLang('it')">ITA</button>
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">ENG</button>
        </div>
    </nav>

    <div class="container">
        <div class="logo">Privacy Policy</div>
        
        <main class="policy-card">
            <div id="content"></div>
        </main>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 RailTrack Dev. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const policies = {
            it: `# Norme sulla privacy per Railtrack

Ultimo aggiornamento: 8 maggio 2026

## 1. Introduzione
Railtrack si impegna a proteggere la tua privacy. Questa informativa sulla privacy spiega come raccogliamo, utilizziamo e condividiamo i tuoi dati quando utilizzi l'app Railtrack.

## 2. Dati raccolti
L'app Railtrack raccoglie i seguenti tipi di dati:

### a. Posizione del dispositivo
L'app utilizza i servizi di localizzazione (GPS) per identificare la stazione ferroviaria più vicina alla tua posizione attuale. Questi dati vengono elaborati esclusivamente in tempo reale e localmente sul dispositivo per fornire suggerimenti pertinenti; non vengono MAI inviati o memorizzati sui nostri server.

### b. Informazioni sul dispositivo e sull'utilizzo
Quando invii volontariamente una segnalazione di errore o un feedback tramite l'app, raccogliamo le seguenti informazioni per aiutarci a diagnosticare e risolvere i problemi:
- Versione di Android
- Marca e modello del dispositivo
- Versione dell'app
- Timestamp della segnalazione
- Titolo e descrizione forniti dall'utente

Inoltre, i servizi pubblicitari di terze parti possono raccogliere identificativi del dispositivo (come l'ID pubblicitario di Android) per finalità di analisi e personalizzazione degli annunci.

### c. Dati memorizzati localmente
L'app memorizza esclusivamente sul tuo dispositivo i seguenti dati per consentirne il funzionamento e migliorare l'esperienza d'uso:
- Stazioni e treni contrassegnati come preferiti
- Cronologia delle ricerche recenti
- Impostazioni del tema (Chiaro, Scuro o di Sistema)
- Stato del completamento dell'onboarding
- Versione dell'ultimo changelog visualizzato
- Preferenze di notifica e aggiornamento automatico

Questi dati risiedono unicamente nella memoria locale del tuo smartphone e non vengono mai sincronizzati con servizi cloud esterni gestiti da noi.

## 3. Modalità di trattamento e finalità
I dati vengono trattati esclusivamente per:
- Fornire le funzionalità principali dell'app (es. ricerca stazioni vicine).
- Migliorare la stabilità dell'app e correggere eventuali bug tramite le segnalazioni inviate.
- Mostrare annunci pubblicitari pertinenti tramite i servizi di terze parti.

Utilizziamo metodi moderni di crittografia (HTTPS) per la trasmissione di qualsiasi dato verso i nostri servizi cloud.

## 4. Servizi di terze parti
Railtrack utilizza i seguenti servizi di terze parti per il suo funzionamento:

- **Google Firebase (Cloud Firestore & Remote Config):** Utilizzato per la ricezione delle segnalazioni di errore e per la configurazione dinamica dell'app.
- **Google AdMob:** Utilizzato per mostrare annunci pubblicitari. AdMob può raccogliere dati sull'utilizzo e identificativi del dispositivo per la personalizzazione degli annunci. Consulta le [Norme sulla privacy di Google](https://policies.google.com/privacy) per ulteriori dettagli.
- **API ViaggiaTreno/Trenitalia:** L'app interroga API pubbliche per fornire informazioni in tempo reale sui treni. Non vengono inviati dati personali a questi servizi durante le query.

## 5. Condivisione dei dati
Non vendiamo i tuoi dati personali a terze parti. I dati sono condivisi con i fornitori di servizi sopra menzionati solo nella misura necessaria per il funzionamento dell'app e dei servizi pubblicitari. I dati possono essere condivisi se richiesto dalla legge o per proteggere i nostri diritti legali.

## 6. Conservazione ed eliminazione dei dati
- **Dati locali:** Le preferenze e i dati memorizzati localmente possono essere eliminati in qualsiasi momento cancellando i dati dell'app dalle impostazioni di Android o disinstallando l'app.
- **Segnalazioni:** Le segnalazioni inviate tramite Firestore sono conservate per il tempo necessario alla risoluzione del problema segnalato. Puoi richiedere l'eliminazione di eventuali dati inviati contattandoci all'indirizzo fornito di seguito.

## 7. Diritti dell'utente
In conformità con il GDPR e altre leggi vigenti sulla protezione dei dati, hai il diritto di accedere, rettificare o richiedere l'eliminazione dei tuoi dati. Poiché l'app non richiede la creazione di un account, la maggior parte dei dati è gestibile direttamente tramite il dispositivo.

## 8. Contatti
Per domande o richieste relative alla tua privacy, puoi contattarci all'indirizzo:
railtrack.dev@gmail.com

---
*Nota: Questa informativa è soggetta a modifiche. Ti consigliamo di consultarla regolarmente.*`,
            en: `# Privacy Policy for Railtrack

Last updated: May 8, 2026

## 1. Introduction
Railtrack is committed to protecting your privacy. This privacy policy explains how we collect, use, and share your data when you use the Railtrack app.

## 2. Data Collection
The Railtrack app collects the following types of data:

### a. Device Location
The app uses location services (GPS) to identify the nearest train station to your current location. This data is processed exclusively in real-time and locally on the device to provide relevant suggestions; it is NEVER sent to or stored on our servers.

### b. Device and Usage Information
When you voluntarily submit a bug report or feedback through the app, we collect the following information to help us diagnose and resolve issues:
- Android version
- Device brand and model
- App version
- Report timestamp
- Title and description provided by the user

Additionally, third-party advertising services may collect device identifiers (such as the Android Advertising ID) for analysis and ad personalization purposes.

### c. Locally Stored Data
The app stores the following data exclusively on your device to enable its functionality and improve your user experience:
- Stations and trains marked as favorites
- Recent search history
- Theme settings (Light, Dark, or System)
- Onboarding completion status
- Last viewed changelog version
- Notification and auto-refresh preferences

This data resides solely in your smartphone's local memory and is never synchronized with external cloud services managed by us.

## 3. Data Processing and Purpose
Data is processed exclusively to:
- Provide core app functionality (e.g., searching for nearby stations).
- Improve app stability and fix bugs through submitted reports.
- Display relevant advertisements through third-party services.

We use modern encryption methods (HTTPS) for the transmission of any data to our cloud services.

## 4. Third-Party Services
Railtrack uses the following third-party services for its operation:

- **Google Firebase (Cloud Firestore & Remote Config):** Used for receiving bug reports and for dynamic app configuration.
- **Google AdMob:** Used to display advertisements. AdMob may collect usage data and device identifiers for ad personalization. See [Google's Privacy Policy](https://policies.google.com/privacy) for more details.
- **ViaggiaTreno/Trenitalia APIs:** The app queries public APIs to provide real-time train information. No personal data is sent to these services during queries.

## 5. Data Sharing
We do not sell your personal data to third parties. Data is shared with the service providers mentioned above only to the extent necessary for app functionality and advertising services. Data may only be shared if required by law or to protect our legal rights.

## 6. Data Retention and Deletion
- **Local Data:** Preferences and data stored locally can be deleted at any time by clearing the app data from Android settings or by uninstalling the app.
- **Reports:** Reports sent via Firestore are kept for the time necessary to resolve the reported issue. You can request the deletion of any submitted data by contacting us at the address provided below.

## 7. User Rights
In accordance with GDPR and other applicable data protection laws, you have the right to access, rectify, or request the deletion of your data. Since the app does not require account creation, most data is manageable directly through your device.

## 8. Contact Us
For questions or requests regarding your privacy, you can contact us at:
railtrack.dev@gmail.com

---
*Note: This policy is subject to change. We recommend checking it regularly.*`
        };

        function setLang(lang) {
            document.documentElement.lang = lang;
            
            // Update buttons
            document.getElementById('btn-it').classList.toggle('active', lang === 'it');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');

            // Render Markdown
            let rawContent = policies[lang];
            
            // Extract the first two lines for special styling (Title and Last Updated)
            const lines = rawContent.split('\n');
            const title = lines[0].replace('# ', '');
            const updated = lines[2];
            const remaining = lines.slice(3).join('\n');

            const html = `
                <h1>${title}</h1>
                <p class="last-updated">${updated}</p>
                ${marked.parse(remaining)}
            `;
            
            document.getElementById('content').innerHTML = html;
        }

        // Auto-detect language
        const userLang = navigator.language || navigator.userLanguage;
        if (userLang.startsWith('it')) {
            setLang('it');
        } else {
            setLang('en');
        }
    </script>
</body>
</html>
